<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>科研助手 · 论文雷达</title>
  <link rel="stylesheet" href="/static/css/style.css" />
</head>
<body>
  <!-- ── 侧边栏 ── -->
  <aside class="sidebar">
    <div class="logo">📡 论文雷达</div>

    <nav>
      <button class="nav-btn active" data-view="papers" data-filter="">全部论文</button>
      <button class="nav-btn" data-view="papers" data-filter="source=arxiv">arXiv</button>
      <button class="nav-btn" data-view="papers" data-filter="source=semantic_scholar">Semantic Scholar</button>
      <button class="nav-btn" data-view="papers" data-filter="source=pwc">HF Daily Papers</button>
      <hr />
      <button class="nav-btn" data-view="papers" data-filter="starred=1">⭐ 收藏</button>
      <button class="nav-btn" data-view="papers" data-filter="unread=1">🔵 未读</button>
      <hr />
      <button class="nav-btn" data-view="trending" data-filter="">🔥 热度排行</button>
    </nav>

    <div class="sidebar-footer">
      <button id="btn-fetch" class="btn-primary">⬇ 立即抓取</button>
      <button id="btn-settings" class="btn-ghost">⚙ 设置</button>
    </div>
  </aside>

  <!-- ── 主区域 ── -->
  <main class="main">
    <!-- 统计栏 -->
    <div class="stats-bar" id="stats-bar">
      <span class="stat">总论文 <b id="s-total">—</b></span>
      <span class="stat">今日新增 <b id="s-today">—</b></span>
      <span class="stat">已收藏 <b id="s-starred">—</b></span>
      <span class="stat">已分析 <b id="s-analyzed">—</b></span>
    </div>

    <!-- ── 论文视图 ── -->
    <div id="view-papers">
      <div class="toolbar">
        <input id="search-box" type="text" placeholder="搜索标题 / 关键词..." />
        <input id="date-filter" type="date" title="按抓取日期筛选" />
      </div>
      <div id="paper-list" class="paper-list">
        <div class="loading">加载中...</div>
      </div>
      <div class="pagination">
        <button id="btn-prev" disabled>← 上一页</button>
        <span id="page-info">第 1 页</span>
        <button id="btn-next">下一页 →</button>
      </div>
    </div>

    <!-- ── 热度排行视图 ── -->
    <div id="view-trending" class="hidden">
      <div class="trending-header">
        <div>
          <h2 class="trending-title">🔥 ML/DL 热度关键词排行</h2>
          <p class="trending-subtitle">点击关键词筛选本地论文 · 点击 AI 获取深度解析</p>
        </div>
        <div class="trending-header-actions">
          <input id="trending-search" type="text" placeholder="筛选关键词..." class="trending-search-input" />
        </div>
      </div>

      <div id="trending-grid" class="trending-grid"></div>

      <!-- AI 面板（关键词点击后出现） -->
      <div id="trending-ai-panel" class="trending-ai-panel hidden">
        <div class="trending-ai-header">
          <span id="trending-ai-title">AI 解析</span>
          <div style="display:flex;gap:8px;align-items:center">
            <button class="btn-ghost btn-sm" id="trending-ai-search-btn">📚 推荐论文</button>
            <button class="btn-ghost btn-sm" id="trending-ai-detail-btn">🔍 关键词详情</button>
            <button class="btn-ghost btn-sm" id="trending-ai-close">✕</button>
          </div>
        </div>
        <div id="trending-ai-content" class="trending-ai-content"></div>
      </div>

      <!-- 关键词对应的本地论文 -->
      <div id="trending-papers-section" class="hidden">
        <div class="trending-papers-header">
          <span id="trending-papers-title">相关论文</span>
          <span id="trending-papers-count" class="muted-text"></span>
        </div>
        <div id="trending-paper-list" class="paper-list" style="max-height:400px"></div>
      </div>
    </div>
  </main>

  <!-- ── 论文详情抽屉 ── -->
  <div id="drawer" class="drawer hidden">
    <div class="drawer-overlay" id="drawer-overlay"></div>
    <div class="drawer-panel">
      <button class="drawer-close" id="drawer-close">✕</button>
      <div id="drawer-content"></div>

      <!-- 关键词提取结果 -->
      <div id="keyword-area"></div>

      <!-- 高级探索聊天区 -->
      <div id="explore-panel" class="explore-panel hidden">
        <div class="explore-header">
          <span class="explore-title">🧠 高级探索 <span class="explore-model-badge" id="explore-model-badge"></span></span>
          <button class="btn-ghost btn-sm" id="explore-end-btn">结束会话 &amp; 保存</button>
        </div>
        <div id="explore-messages" class="explore-messages"></div>
        <div class="explore-input-area" id="explore-input-area">
          <textarea id="explore-input" placeholder="继续探索，输入你的问题..." rows="3"></textarea>
          <button class="btn-primary btn-sm" id="explore-send-btn">发送</button>
        </div>
        <div id="explore-digest-area" class="explore-digest hidden"></div>
      </div>

      <!-- 历史记录 -->
      <div id="history-section" class="history-section hidden">
        <div class="history-header" id="history-toggle">
          <span>📂 历史记录</span>
          <span class="history-arrow">▾</span>
        </div>
        <div id="history-list" class="history-list"></div>
      </div>
    </div>
  </div>

  <!-- ── 设置弹窗 ── -->
  <div id="modal-settings" class="modal hidden">
    <div class="modal-box">
      <h2>⚙ 系统设置</h2>

      <div class="settings-section">
        <div class="settings-section-title">🔍 普通分析 / 关键词 / 热度排行（Qwen）</div>
        <label>API Key
          <input type="password" id="cfg-normal-key" placeholder="DashScope key / sk-..." />
        </label>
        <label>模型名称
          <input type="text" id="cfg-normal-model" placeholder="qwen3.5-plus" />
        </label>
      </div>

      <div class="settings-section">
        <div class="settings-section-title">🧠 高级探索（Claude）</div>
        <label>API Key
          <input type="password" id="cfg-advanced-key" placeholder="Anthropic key / sk-ant-..." />
        </label>
        <label>模型名称
          <input type="text" id="cfg-advanced-model" placeholder="claude-sonnet-4-6" />
        </label>
      </div>

      <div class="settings-section">
        <div class="settings-section-title">📡 抓取设置</div>
        <label>每日推送时间（小时，0–23）
          <input type="number" id="cfg-hour" min="0" max="23" />
        </label>
        <label>每源最多抓取篇数
          <input type="number" id="cfg-max" min="5" max="100" />
        </label>
        <label>关键词（每行一个）
          <textarea id="cfg-keywords" rows="6"></textarea>
        </label>
      </div>

      <div class="modal-actions">
        <button id="btn-save-cfg" class="btn-primary">保存</button>
        <button id="btn-cancel-cfg" class="btn-ghost">取消</button>
      </div>
    </div>
  </div>

  <div id="toast" class="toast hidden"></div>
  <script src="/static/js/app.js"></script>
</body>
</html>
