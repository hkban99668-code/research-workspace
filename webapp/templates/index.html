<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>科研助手 · 论文雷达</title>
  <link rel="stylesheet" href="/static/css/style.css" />
</head>
<body>
  <!-- ── 侧边栏 ── -->
  <aside class="sidebar">
    <div class="logo">📡 论文雷达</div>

    <nav>
      <button class="nav-btn active" data-filter="">全部</button>
      <button class="nav-btn" data-filter="source=arxiv">arXiv</button>
      <button class="nav-btn" data-filter="source=semantic_scholar">Semantic Scholar</button>
      <button class="nav-btn" data-filter="source=pwc">HF Daily Papers</button>
      <hr />
      <button class="nav-btn" data-filter="starred=1">⭐ 收藏</button>
      <button class="nav-btn" data-filter="unread=1">🔵 未读</button>
    </nav>

    <div class="sidebar-footer">
      <button id="btn-fetch" class="btn-primary">⬇ 立即抓取</button>
      <button id="btn-settings" class="btn-ghost">⚙ 设置</button>
    </div>
  </aside>

  <!-- ── 主区域 ── -->
  <main class="main">
    <!-- 统计栏 -->
    <div class="stats-bar" id="stats-bar">
      <span class="stat">总论文 <b id="s-total">—</b></span>
      <span class="stat">今日新增 <b id="s-today">—</b></span>
      <span class="stat">已收藏 <b id="s-starred">—</b></span>
      <span class="stat">已分析 <b id="s-analyzed">—</b></span>
    </div>

    <!-- 搜索/过滤 -->
    <div class="toolbar">
      <input id="search-box" type="text" placeholder="搜索标题 / 关键词..." />
      <input id="date-filter" type="date" title="按抓取日期筛选" />
    </div>

    <!-- 论文列表 -->
    <div id="paper-list" class="paper-list">
      <div class="loading">加载中...</div>
    </div>

    <div class="pagination">
      <button id="btn-prev" disabled>← 上一页</button>
      <span id="page-info">第 1 页</span>
      <button id="btn-next">下一页 →</button>
    </div>
  </main>

  <!-- ── 论文详情抽屉 ── -->
  <div id="drawer" class="drawer hidden">
    <div class="drawer-overlay" id="drawer-overlay"></div>
    <div class="drawer-panel">
      <button class="drawer-close" id="drawer-close">✕</button>
      <div id="drawer-content"></div>
    </div>
  </div>

  <!-- ── 设置弹窗 ── -->
  <div id="modal-settings" class="modal hidden">
    <div class="modal-box">
      <h2>⚙ 系统设置</h2>
      <label>Claude API Key
        <input type="password" id="cfg-api-key" placeholder="sk-ant-..." />
      </label>
      <label>每日推送时间（小时，0–23）
        <input type="number" id="cfg-hour" min="0" max="23" />
      </label>
      <label>每源最多抓取篇数
        <input type="number" id="cfg-max" min="5" max="100" />
      </label>
      <label>关键词（每行一个）
        <textarea id="cfg-keywords" rows="8"></textarea>
      </label>
      <div class="modal-actions">
        <button id="btn-save-cfg" class="btn-primary">保存</button>
        <button id="btn-cancel-cfg" class="btn-ghost">取消</button>
      </div>
    </div>
  </div>

  <div id="toast" class="toast hidden"></div>

  <script src="/static/js/app.js"></script>
</body>
</html>
